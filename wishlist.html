<!DOCTYPE html>
<html>
<head>
<title>My Wishlist ❤️</title>

<style>

body{
    font-family:Arial;
    padding:20px;
    background:#f5f5f5;
}

h1{
    color:#5c0000;
    text-align:center;
}

.item{
    background:white;
    border-radius:10px;
    padding:15px;
    margin-bottom:20px;
    display:flex;
    gap:20px;
    align-items:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.item img{
    width:150px;
    height:200px;
    object-fit:cover;
    border-radius:8px;
}

.item-content{
    flex:1;
}

.price{
    color:#5c0000;
    font-size:20px;
    font-weight:bold;
}

.add-cart{
    background:green;
    color:white;
    border:none;
    padding:10px 15px;
    cursor:pointer;
    border-radius:5px;
    margin-right:10px;
}

.remove-btn{
    background:red;
    color:white;
    border:none;
    padding:10px 15px;
    cursor:pointer;
    border-radius:5px;
}

.empty{
    text-align:center;
    color:gray;
    margin-top:50px;
}

</style>

</head>
<body>

<h1>My Wishlist ❤️</h1>

<div id="wishlist-container"></div>

<script>

function loadWishlist(){

    const wishlist =
        JSON.parse(
            localStorage.getItem("wishlist")
        ) || [];

    const container =
        document.getElementById(
            "wishlist-container"
        );

    container.innerHTML = "";

    if(wishlist.length === 0){

        container.innerHTML = `
            <div class="empty">
                <h2>No items in wishlist ❤️</h2>
            </div>
        `;

        return;
    }

    wishlist.forEach((product,index)=>{

        container.innerHTML += `

        <div class="item">

            <img src="${product.image_url}"
                 onerror="this.src='https://picsum.photos/150/200'">

            <div class="item-content">

                <h2>${product.name}</h2>

                <p class="price">
                    ₹${product.price}
                </p>

                <p>
                    Category:
                    ${product.category}
                </p>

                <br>

                <button
                    class="add-cart"
                    onclick="moveToCart(${index})">

                    Add To Cart

                </button>

                <button
                    class="remove-btn"
                    onclick="removeWishlist(${index})">

                    Remove

                </button>

            </div>

        </div>

        `;
    });
}

function removeWishlist(index){

    let wishlist =
        JSON.parse(
            localStorage.getItem("wishlist")
        ) || [];

    wishlist.splice(index,1);

    localStorage.setItem(
        "wishlist",
        JSON.stringify(wishlist)
    );

    loadWishlist();
}

function moveToCart(index){

    let wishlist =
        JSON.parse(
            localStorage.getItem("wishlist")
        ) || [];

    let cart =
        JSON.parse(
            localStorage.getItem("cart")
        ) || [];

    cart.push(wishlist[index]);

    localStorage.setItem(
        "cart",
        JSON.stringify(cart)
    );

    wishlist.splice(index,1);

    localStorage.setItem(
        "wishlist",
        JSON.stringify(wishlist)
    );

    alert("Item added to cart successfully!");

    loadWishlist();
}

loadWishlist();

</script>

</body>
</html>
